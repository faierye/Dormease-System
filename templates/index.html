<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DormEase Landing</title>
    <link rel="stylesheet" href="static/css/index.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="logo">
            <div>
                <h2>Leyte Normal University</h2>
                <p>Integrity | Excellence | Service</p>
            </div>
        </div>

        <div class="admin" onclick="goLogin()">
            <span>Admin</span>
            <i class="fi fi-sr-user"></i>
        </div>
    </header>

    <!-- Main Content -->
    <div class="content">

        <!-- Left Text -->
        <div class="left">
            <h3>Welcome to</h3>
            <h1>DormEase</h1>
            <p>Leyte Normal University<br>Dormitory</p>
        </div>

        <!-- Right Card -->
        <div class="card">
            <h3>Get Application Form</h3>
            <button onclick="applyNow()">APPLY NOW</button>

            <hr>

            <p class="inq">For Inquiries:</p>

            <div class="icons">
                <i class="fi fi-sr-phone-call"></i>
                <i class="fi fi-sr-envelope"></i>
            </div>
        </div>

    </div>

</div>

<script src="static/js/script.js"></script>
</body>
</html>
